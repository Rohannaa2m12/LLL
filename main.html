<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>LLL — Lama Love Ledger</title>
  <style>
    :root{
      --bg0:#0b0e12;
      --bg1:#10151c;
      --bg2:#141b25;
      --edge:#1c2633;
      --fg0:#e0e7ef;
      --fg1:#b8c4d2;
      --dim:#7e8aa0;
      --lime:#46dca0;
      --amber:#ffbe50;
      --cyan:#5acbff;
      --blue:#7a90ff;
      --red:#ff6060;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      --radius: 12px;
      --shadow: 0 14px 40px rgba(0,0,0,.45);
      --glow: 0 0 0 1px rgba(122,144,255,.15), 0 12px 30px rgba(0,0,0,.55);
      --cell: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: radial-gradient(1200px 900px at 20% 10%, rgba(90,203,255,.08), transparent 55%),
                  radial-gradient(900px 700px at 80% 25%, rgba(255,190,80,.06), transparent 52%),
                  radial-gradient(1200px 900px at 55% 90%, rgba(70,220,160,.06), transparent 52%),
                  var(--bg0);
      color:var(--fg0);
      font-family:var(--sans);
      overflow:hidden;
    }
    a{color:inherit}
    .mono{font-family:var(--mono)}
    .dim{color:var(--dim)}
    .accent{color:var(--amber); font-weight:700}
    .ok{color:var(--lime); font-weight:700}
    .warn{color:var(--amber); font-weight:700}
    .bad{color:var(--red); font-weight:700}
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px; border:1px solid var(--edge); border-radius:999px;
      background:rgba(255,255,255,.02);
      font-family:var(--mono); font-size:12px; color:var(--fg1);
    }
    .chip b{color:var(--fg0)}
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:9px 12px; border-radius:10px;
      border:1px solid var(--edge);
      background:rgba(255,255,255,.03);
      color:var(--fg0);
      font-family:var(--mono); font-size:12px; font-weight:700;
      cursor:pointer; user-select:none;
      transition: transform .07s ease, background .15s ease, border-color .15s ease;
      white-space:nowrap;
    }
    .btn:hover{background:rgba(255,255,255,.05); border-color:#253244}
    .btn:active{transform: translateY(1px)}
    .btn.primary{border-color:rgba(122,144,255,.35); box-shadow:var(--glow)}
    .btn.lime{color:var(--lime); border-color:rgba(70,220,160,.25)}
    .btn.cyan{color:var(--cyan); border-color:rgba(90,203,255,.25)}
    .btn.amber{color:var(--amber); border-color:rgba(255,190,80,.25)}
    .btn.red{color:var(--red); border-color:rgba(255,96,96,.25)}
    .grid{
      display:grid;
      grid-template-columns: 1.35fr 0.95fr;
      grid-template-rows: 62px 1fr 132px;
      gap:14px;
      height:100%;
      padding:14px;
    }
    .panel{
      background: var(--cell);
      border: 1px solid var(--edge);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .panelHeader{
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 14px;
      background: rgba(0,0,0,.22);
      border-bottom:1px solid var(--edge);
    }
    .panelHeader .title{
      display:flex; align-items:baseline; gap:10px;
      font-family:var(--mono);
      font-weight:800;
      letter-spacing:.04em;
      font-size:13px;
      color:var(--fg0);
    }
    .panelHeader .title .tag{
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      color:var(--fg1);
      font-weight:700;
      font-size:11px;
    }
    .panelHeader .right{
      display:flex; gap:10px; align-items:center;
      font-family:var(--mono); font-size:12px; color:var(--dim);
    }
    .panelBody{padding:12px 14px}
    .top{
      grid-column:1 / 3;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 8px 0 6px;
    }
    .brand{
      display:flex; align-items:center; gap:12px;
    }
    .logo{
      width:38px; height:38px; border-radius:12px;
      border:1px solid rgba(255,190,80,.32);
      background:
        radial-gradient(18px 18px at 30% 30%, rgba(255,190,80,.28), transparent 65%),
        radial-gradient(20px 20px at 70% 65%, rgba(90,203,255,.24), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
      box-shadow: 0 10px 25px rgba(0,0,0,.45);
      display:grid; place-items:center;
      font-family:var(--mono); font-weight:900;
      color:var(--amber);
    }
    .brand h1{
      margin:0;
      font-size:14px;
      letter-spacing:.08em;
      font-weight:900;
      font-family:var(--mono);
    }
    .brand .sub{
      margin-top:4px;
      font-size:12px;
      color:var(--dim);
      font-family:var(--mono);
    }
    .topRight{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;
      padding-right:6px;
    }
    .main{
      grid-column: 1;
      grid-row: 2;
      display:flex;
      flex-direction:column;
    }
    .side{
      grid-column: 2;
      grid-row: 2;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .bottom{
      grid-column:1 / 3;
      display:grid;
      grid-template-columns: 1.5fr 1fr;
      gap:14px;
    }
    .term{
      height:100%;
      display:flex;
      flex-direction:column;
    }
    .termOut{
      flex:1;
      padding:12px 14px;
      font-family:var(--mono);
      font-size:12px;
      color:var(--fg0);
      overflow:auto;
      line-height:1.5;
      background: rgba(0,0,0,.12);
    }
    .termOut .row{
      display:grid;
      grid-template-columns: 92px 1fr;
      gap:10px;
      padding:2px 0;
      border-bottom:1px dashed rgba(255,255,255,.04);
    }
    .termOut .row:last-child{border-bottom:none}
    .termOut .t{color:var(--dim)}
    .termOut .msg{white-space:pre-wrap; word-break:break-word}
    .termCmd{
      display:flex;
      gap:10px;
      align-items:center;
      padding:12px 14px;
      border-top:1px solid var(--edge);
      background: rgba(0,0,0,.20);
    }
    .termCmd .prompt{
      font-family:var(--mono);
      font-size:12px;
      color:var(--amber);
      font-weight:900;
      letter-spacing:.06em;
    }
    .termCmd input{
      flex:1;
      font-family:var(--mono);
      font-size:12px;
      color:var(--fg0);
      background: rgba(255,255,255,.03);
      border:1px solid var(--edge);
      border-radius:10px;
      padding:10px 12px;
      outline:none;
    }
    .termCmd input:focus{
      border-color: rgba(122,144,255,.40);
      box-shadow: 0 0 0 3px rgba(122,144,255,.12);
    }
    .table{
      width:100%;
      border-collapse:collapse;
      font-family:var(--mono);
      font-size:12px;
    }
    .table th, .table td{
      padding:8px 9px;
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .table th{
      text-align:left;
      color:var(--fg1);
      background: rgba(0,0,0,.12);
      position:sticky;
      top:0;
      z-index:2;
    }
    .table tr:hover td{background: rgba(255,255,255,.02)}
    .k{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      font-family:var(--mono);
      color:var(--fg1);
      font-size:12px;
    }
    .k .kv{display:flex; gap:8px; align-items:baseline}
    .k .kv .key{color:var(--dim)}
    .k .kv .val{color:var(--fg0); font-weight:800}
    .formGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .field{
      display:flex; flex-direction:column; gap:6px;
      font-family:var(--mono);
      font-size:12px;
    }
    .field label{color:var(--dim)}
    .field input, .field select, .field textarea{
      background: rgba(255,255,255,.03);
      border:1px solid var(--edge);
      border-radius:10px;
      padding:9px 10px;
      color:var(--fg0);
      font-family:var(--mono);
      outline:none;
    }
    .field textarea{min-height:84px; resize:vertical; line-height:1.4}
    .field input:focus, .field select:focus, .field textarea:focus{
      border-color: rgba(90,203,255,.38);
      box-shadow: 0 0 0 3px rgba(90,203,255,.10);
    }
    .row2{grid-column:1 / 3}
    .tiny{font-size:11px; color:var(--dim)}
    .split{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    .codeBox{
      font-family:var(--mono);
      font-size:12px;
      line-height:1.45;
      padding:10px 12px;
      background: rgba(0,0,0,.14);
      border:1px solid rgba(255,255,255,.07);
      border-radius:10px;
      overflow:auto;
      max-height:220px;
      white-space:pre;
      color:var(--fg0);
    }
    .codeBox .dim{color:var(--dim)}
    canvas{display:block}
    .chartWrap{
      border:1px solid rgba(255,255,255,.07);
      border-radius:10px;
      overflow:hidden;
      background: rgba(0,0,0,.12);
    }
    .toast{
      position:fixed;
      right:16px;
      bottom:16px;
      background: rgba(16,21,28,.92);
      border:1px solid rgba(255,255,255,.10);
      border-radius:12px;
      padding:12px 14px;
      font-family:var(--mono);
      color:var(--fg0);
      box-shadow: var(--shadow);
      max-width: 460px;
      display:none;
    }
    .toast.show{display:block}
    .toast .t{color:var(--dim); font-size:11px}
    .toast .m{margin-top:4px; font-size:12px; white-space:pre-wrap}
    @media (max-width: 980px){
      body{overflow:auto}
      .grid{
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        height:auto;
      }
      .top{grid-column:1}
      .main{grid-column:1; grid-row:auto}
      .side{grid-column:1; grid-row:auto}
      .bottom{grid-column:1; grid-template-columns:1fr}
    }
